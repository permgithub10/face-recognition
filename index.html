<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ลงชื่อพ่นฆ่าเชื้อ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .schedule-info {
            background: #e6f7ff;
            padding: 12px;
            border-radius: 30px;
            margin: 16px 0;
            font-size: 1rem;
            font-weight: bold;
            color: #014361;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 24px 0 20px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:active {
            transform: scale(0.97);
            background: #1f5e7a;
        }
        .footer {
            background: #e2e8f0;
            padding: 12px;
            border-radius: 30px;
            color: #2d3748;
            font-size: 0.9rem;
        }
        @media (max-width: 550px) {
            .card { padding: 24px 16px; }
            h1 { font-size: 1.5rem; }
            button { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧼 ลงชื่อพ่นฆ่าเชื้อประจำสัปดาห์</h1>
    <div class="schedule-info" id="scheduleStatus">🔄 กำลังโหลดข้อมูลเวลา...</div>
    <div class="btn-group">
        <button onclick="location.href='register.html'">📝 ลงทะเบียนใบหน้า</button>
        <button onclick="location.href='scan.html'">✅ ลงชื่อ</button>
    </div>
    <div class="footer">
        👋 โปรดลงชื่อในช่วงเวลาที่กำหนด
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz2dKdJllko2cAZkbwJo_c5A2Y5lPoioBQ-kbByioLufD8f1OatrC7vYw6co-kOFSHE/exec";  // 🔁 แก้ไข URL

    async function loadScheduleStatus() {
        const scheduleDiv = document.getElementById('scheduleStatus');
        try {
            const response = await fetch(`${API_URL}?action=getScheduleStatus`);
            const result = await response.json();
            if (result.success && result.canSign !== undefined) {
                scheduleDiv.innerText = result.message;
                scheduleDiv.style.backgroundColor = result.canSign ? "#d4edda" : "#f8d7da";
                scheduleDiv.style.color = result.canSign ? "#155724" : "#721c24";
            } else {
                scheduleDiv.innerText = "❌ ไม่สามารถโหลดข้อมูลเวลาได้";
            }
        } catch (err) {
            console.error(err);
            scheduleDiv.innerText = "⚠️ ตรวจสอบการเชื่อมต่อกับเซิร์ฟเวอร์";
        }
    }

    window.onload = loadScheduleStatus;
</script>
</body>
</html>
