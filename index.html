<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ลงชื่อพ่นฆ่าเชื้อ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .schedule-info {
            background: #e6f7ff;
            padding: 16px 12px;
            border-radius: 30px;
            margin: 20px 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #014361;
            white-space: pre-line;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 24px 0 20px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:active {
            transform: scale(0.97);
            background: #1f5e7a;
        }
        button:disabled {
            background: #a0aec0;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .footer {
            background: #e2e8f0;
            padding: 12px;
            border-radius: 30px;
            color: #2d3748;
            font-size: 0.9rem;
        }
        @media (max-width: 550px) {
            .card { padding: 24px 16px; }
            h1 { font-size: 1.5rem; }
            button { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🧼 ลงชื่อพ่นฆ่าเชื้อประจำสัปดาห์</h1>
    <div class="schedule-info" id="scheduleStatus">🔄 กำลังโหลดข้อมูลเวลา...</div>
    <div class="btn-group">
        <button onclick="location.href='register.html'">📝 ลงทะเบียนใบหน้า</button>
        <button id="scanButton" disabled>✅ ลงชื่อ</button>
    </div>
    <div class="footer">
        👋 โปรดลงชื่อในช่วงเวลาที่กำหนด
    </div>
</div>

<script>
    // ⚠️ กรุณาเปลี่ยน URL ด้านล่างเป็น URL ของ Web App ที่ deploy แล้ว
    const API_URL = "https://script.google.com/macros/s/AKfycbwm_LnuYnfIh9_m4ax3lvFbJXnh-XXb67j85NGRlt1ZQP1nm13xXrItIwKicM4mmnd6/exec";

    const scheduleDiv = document.getElementById('scheduleStatus');
    const scanButton = document.getElementById('scanButton');

    // ฟังก์ชันสำหรับอัปเดต UI ตามสถานะ canSign
    function updateUIFromSchedule(canSign, message) {
        scheduleDiv.innerText = message;
        if (canSign) {
            scheduleDiv.style.backgroundColor = "#d4edda";
            scheduleDiv.style.color = "#155724";
            scanButton.disabled = false;
        } else {
            scheduleDiv.style.backgroundColor = "#fff3cd";
            scheduleDiv.style.color = "#856404";
            scanButton.disabled = true;
        }
    }

    async function loadScheduleStatus() {
        try {
            const response = await fetch(`${API_URL}?action=getScheduleStatus`);
            const result = await response.json();
            if (result.success && result.canSign !== undefined) {
                updateUIFromSchedule(result.canSign, result.message);
            } else {
                scheduleDiv.innerText = "❌ ไม่สามารถโหลดข้อมูลเวลาได้";
                scanButton.disabled = true;
            }
        } catch (err) {
            console.error(err);
            scheduleDiv.innerText = "⚠️ ตรวจสอบการเชื่อมต่อกับเซิร์ฟเวอร์";
            scanButton.disabled = true;
        }
    }

    // เมื่อคลิกปุ่มลงชื่อ (จะทำงานเฉพาะเมื่อ enabled)
    scanButton.addEventListener('click', () => {
        location.href = 'scan.html';
    });

    // โหลดสถานะครั้งแรก
    window.onload = loadScheduleStatus;

    // (ตัวเลือก) รีเฟรชสถานะทุกๆ 30 วินาที เผื่อเวลาเปลี่ยนผ่าน
    setInterval(loadScheduleStatus, 30000);
</script>
</body>
</html>
