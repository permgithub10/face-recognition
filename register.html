<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ลงทะเบียนใบหน้า</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            overflow: hidden;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            width: 100%;
            height: 58vh;
            min-height: 300px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        input, button {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 60px;
            border: none;
            margin: 8px 0;
            font-weight: bold;
        }
        input {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #2c7da0;
        }
        button {
            background: #2c7da0;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button.secondary {
            background: #475569;
        }
        .status {
            background: #e6f7ff;
            padding: 12px;
            border-radius: 28px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.9rem;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        @media (max-width: 550px) {
            .container { padding: 16px; }
            .video-wrapper { height: 52vh; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📸 ลงทะเบียนใบหน้า</h2>
    <div class="video-wrapper">
        <video id="registerVideo" autoplay muted playsinline></video>
    </div>
    <input type="text" id="regName" placeholder="ชื่อ-นามสกุล" autocomplete="off">
    <button id="captureBtn">💾 บันทึกใบหน้า</button>
    <div class="btn-group">
        <button id="backHomeBtn" class="secondary">◀ กลับหน้าแรก</button>
    </div>
    <div id="regStatus" class="status">📷 กรอกชื่อแล้วกด "บันทึกใบหน้า"</div>
</div>

<script>
    // ---------- ตั้งค่า API URL (เปลี่ยนเป็น Apps Script URL ของคุณ) ----------
    const API_URL = "https://script.google.com/macros/s/AKfycby5NA4JZDM_YBsVGbIg0Ws9CaTDH7f3BWa4GJQXHXa6QX0kr_4GQvaB7cdFkRqqeYbx/exec";

    let modelsLoaded = false;
    let currentStream = null;
    const video = document.getElementById('registerVideo');
    const regNameInput = document.getElementById('regName');
    const regStatusDiv = document.getElementById('regStatus');
    const captureBtn = document.getElementById('captureBtn');

    async function startCamera() {
        if (currentStream) stopCamera();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            currentStream = stream;
            await video.play();
            return true;
        } catch (err) {
            regStatusDiv.innerText = "❌ ไม่สามารถเปิดกล้องได้";
            return false;
        }
    }
    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
    }

    async function loadModels() {
        const MODEL_URL = './models';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            modelsLoaded = true;
            regStatusDiv.innerText = "✅ กล้องพร้อม, กรอกชื่อแล้วกดบันทึก";
        } catch (err) {
            console.error(err);
            regStatusDiv.innerText = "❌ โหลดโมเดลไม่สำเร็จ ตรวจสอบโฟลเดอร์ /models";
        }
    }

    async function getFaceDescriptor() {
        if (!modelsLoaded) throw new Error("Model ยังไม่โหลด");
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();
        if (!detection) return null;
        return detection.descriptor;
    }

    async function registerFace() {
        const name = regNameInput.value.trim();
        if (!name) {
            alert("⚠️ กรุณากรอกชื่อก่อนบันทึก");
            return;
        }
        if (!modelsLoaded) {
            alert("⏳ กำลังโหลดโมเดล กรุณารอสักครู่");
            return;
        }
        regStatusDiv.innerText = "🔍 กำลังตรวจจับใบหน้า...";
        let descriptor;
        try {
            descriptor = await getFaceDescriptor();
        } catch(err) {
            regStatusDiv.innerText = "⚠️ ข้อผิดพลาด: " + err.message;
            return;
        }
        if (!descriptor) {
            regStatusDiv.innerText = "😕 ไม่พบใบหน้า ให้อยู่ในกรอบแล้วลองใหม่";
            return;
        }
        const descriptorArray = Array.from(descriptor);
        regStatusDiv.innerText = "📡 กำลังส่งข้อมูล...";
        
        const formData = new URLSearchParams();
        formData.append('action', 'register');
        formData.append('name', name);
        formData.append('descriptor', JSON.stringify(descriptorArray));
        
        const xhr = new XMLHttpRequest();
        xhr.open('POST', API_URL);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        
        xhr.onload = function() {
            if (xhr.status === 200) {
                try {
                    const result = JSON.parse(xhr.responseText);
                    if (result.success) {
                        // ✅ แจ้งสำเร็จตามที่ต้องการ
                        alert(`✅ บันทึกใบหน้าเรียบร้อย! (${name})`);
                        regStatusDiv.innerText = "✔️ บันทึกสำเร็จ! สามารถลงทะเบียนเพิ่มหรือกลับหน้าแรก";
                        regNameInput.value = "";
                    } else {
                        // กรณี success = false: ไม่มี alert error
                        regStatusDiv.innerText = "❌ บันทึกไม่สำเร็จ: " + (result.message || "เกิดข้อผิดพลาด");
                    }
                } catch (e) {
                    // JSON parse error: ไม่มี alert error
                    regStatusDiv.innerText = "⚠️ ข้อมูลตอบกลับไม่ถูกต้อง (ไม่ใช่ JSON)";
                }
            } else {
                // HTTP status ไม่ใช่ 200: ไม่มี alert error
                regStatusDiv.innerText = `🌐 การเชื่อมต่อล้มเหลว (HTTP ${xhr.status})`;
            }
        };
        
        // ✅ ตัดการแจ้งเตือน network error ออกทั้งหมด (ไม่เปลี่ยนข้อความ, ไม่ alert)
        xhr.onerror = function() {
            // ไม่ทำอะไรเลย -> ผู้ใช้จะไม่เห็น error ใดๆ
            // ข้อความใน regStatusDiv จะยังคงเป็น "📡 กำลังส่งข้อมูล..."
        };
        
        xhr.send(formData);
    }

    function goHome() {
        stopCamera();
        location.href = 'index.html';
    }

    window.onload = async () => {
        await loadModels();
        await startCamera();
        captureBtn.onclick = registerFace;
        document.getElementById('backHomeBtn').onclick = goHome;
    };
    window.onbeforeunload = () => stopCamera();
</script>
</body>
</html>
