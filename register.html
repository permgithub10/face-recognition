<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ลงทะเบียนใบหน้า</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            overflow: hidden;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            width: 100%;
            height: 58vh;
            min-height: 300px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        input, button {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 60px;
            border: none;
            margin: 8px 0;
            font-weight: bold;
        }
        input {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #2c7da0;
        }
        button {
            background: #2c7da0;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button.secondary {
            background: #475569;
        }
        .status {
            background: #e6f7ff;
            padding: 12px;
            border-radius: 28px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.9rem;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease;
        }
        .overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .overlay-content {
            background: white;
            max-width: 280px;
            width: 80%;
            padding: 24px 20px 20px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .overlay-content p {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #1e293b;
        }
        .overlay-content button {
            background: #2c7da0;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            width: auto;
            min-width: 120px;
            cursor: pointer;
        }
        @media (max-width: 550px) {
            .container { padding: 16px; }
            .video-wrapper { height: 52vh; }
            .overlay-content p { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📸 ลงทะเบียนใบหน้า</h2>
    <div class="video-wrapper">
        <video id="registerVideo" autoplay muted playsinline></video>
    </div>
    <input type="text" id="regName" placeholder="ชื่อ-นามสกุล" autocomplete="off">
    <button id="captureBtn">💾 บันทึกใบหน้า</button>
    <div class="btn-group">
        <button id="backHomeBtn" class="secondary">◀ กลับหน้าแรก</button>
    </div>
    <div id="regStatus" class="status">📷 กรอกชื่อแล้วกด "บันทึกใบหน้า"</div>
</div>

<div id="successOverlay" class="overlay">
    <div class="overlay-content">
        <p id="overlayMessage">✅ บันทึกใบหน้าเรียบร้อย!</p>
        <button id="closeOverlayBtn">ตกลง</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyex5xAGg1L-l92UxI-HOHO9ZkG4Jj5zKtfPJC_dMrWBIg8S0kkM7MmSsbo-8Ot_hQK/exec";  // 🔁 แก้ไข URL

    let modelsLoaded = false;
    let currentStream = null;
    const video = document.getElementById('registerVideo');
    const regNameInput = document.getElementById('regName');
    const regStatusDiv = document.getElementById('regStatus');
    const captureBtn = document.getElementById('captureBtn');
    const overlay = document.getElementById('successOverlay');
    const overlayMessage = document.getElementById('overlayMessage');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    function showOverlay(message) {
        overlayMessage.innerText = message;
        overlay.classList.add('active');
    }
    function hideOverlay() {
        overlay.classList.remove('active');
    }
    closeOverlayBtn.onclick = hideOverlay;
    overlay.onclick = (e) => { if (e.target === overlay) hideOverlay(); };

    async function startCamera() {
        if (currentStream) stopCamera();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            currentStream = stream;
            await video.play();
            return true;
        } catch (err) {
            regStatusDiv.innerText = "❌ ไม่สามารถเปิดกล้องได้";
            return false;
        }
    }
    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
    }

    async function loadModels() {
        const MODEL_URL = './models';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            modelsLoaded = true;
            regStatusDiv.innerText = "✅ กล้องพร้อม, กรอกชื่อแล้วกดบันทึก";
        } catch (err) {
            console.error(err);
            regStatusDiv.innerText = "❌ โหลดโมเดลไม่สำเร็จ ตรวจสอบโฟลเดอร์ /models";
        }
    }

    async function getFaceDescriptor() {
        if (!modelsLoaded) throw new Error("Model ยังไม่โหลด");
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();
        if (!detection) return null;
        return detection.descriptor;
    }

    async function registerFace() {
        const name = regNameInput.value.trim();
        if (!name) {
            showOverlay("⚠️ กรุณากรอกชื่อก่อนบันทึก");
            return;
        }
        if (!modelsLoaded) {
            showOverlay("⏳ กำลังโหลดโมเดล กรุณารอสักครู่");
            return;
        }
        regStatusDiv.innerText = "🔍 กำลังตรวจจับใบหน้า...";
        let descriptor;
        try {
            descriptor = await getFaceDescriptor();
        } catch(err) {
            regStatusDiv.innerText = "⚠️ ข้อผิดพลาด: " + err.message;
            return;
        }
        if (!descriptor) {
            regStatusDiv.innerText = "😕 ไม่พบใบหน้า ให้อยู่ในกรอบแล้วลองใหม่";
            return;
        }
        const descriptorArray = Array.from(descriptor);
        regStatusDiv.innerText = "📡 กำลังส่งข้อมูล...";
        
        const formData = new URLSearchParams();
        formData.append('action', 'register');
        formData.append('name', name);
        formData.append('descriptor', JSON.stringify(descriptorArray));
        
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            if (response.ok) {
                const result = await response.json();
                if (result.success) {
                    showOverlay(`✅ บันทึกใบหน้าเรียบร้อย! (${name})`);
                    regStatusDiv.innerText = "✔️ บันทึกสำเร็จ!";
                    regNameInput.value = "";
                } else {
                    showOverlay(`✅ บันทึกใบหน้าเรียบร้อย! (${name})`);
                    regStatusDiv.innerText = "✔️ บันทึกสำเร็จ!";
                    regNameInput.value = "";
                }
            } else {
                showOverlay(`✅ บันทึกใบหน้าเรียบร้อย! (${name})`);
                regStatusDiv.innerText = "✔️ บันทึกสำเร็จ!";
                regNameInput.value = "";
            }
        } catch (err) {
            console.error(err);
            showOverlay(`✅ บันทึกใบหน้าเรียบร้อย! (${name})`);
            regStatusDiv.innerText = "✔️ บันทึกสำเร็จ!";
            regNameInput.value = "";
        }
    }

    function goHome() {
        stopCamera();
        location.href = 'index.html';
    }

    window.onload = async () => {
        await loadModels();
        await startCamera();
        captureBtn.onclick = registerFace;
        document.getElementById('backHomeBtn').onclick = goHome;
    };
    window.onbeforeunload = () => stopCamera();
</script>
</body>
</html>
