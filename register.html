<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ลงทะเบียนใบหน้า</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            overflow: hidden;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            width: 100%;
            height: 58vh;
            min-height: 300px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        input, button {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 60px;
            border: none;
            margin: 8px 0;
            font-weight: bold;
        }
        input {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #2c7da0;
        }
        button {
            background: #2c7da0;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            background: #94a3b8;
            transform: none;
            cursor: not-allowed;
        }
        button.secondary {
            background: #475569;
        }
        .status {
            background: #e6f7ff;
            padding: 12px;
            border-radius: 28px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.9rem;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease;
        }
        .overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .overlay-content {
            background: white;
            max-width: 280px;
            width: 80%;
            padding: 24px 20px 20px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .overlay-content p {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #1e293b;
        }
        .overlay-content button {
            background: #2c7da0;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            width: auto;
            min-width: 120px;
            cursor: pointer;
        }
        .counter-badge {
            display: inline-block;
            background: #2c7da0;
            color: white;
            border-radius: 20px;
            padding: 4px 12px;
            margin-left: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📸 ลงทะเบียนใบหน้า</h2>
    <div class="video-wrapper">
        <video id="registerVideo" autoplay muted playsinline></video>
        <canvas id="overlayCanvas"></canvas>
    </div>
    <input type="text" id="regName" placeholder="ชื่อ-นามสกุล" autocomplete="off">
    <button id="captureBtn">💾 เริ่มเก็บภาพ (0/3)</button>
    <div class="btn-group">
        <button id="backHomeBtn" class="secondary">◀ กลับหน้าแรก</button>
    </div>
    <div id="regStatus" class="status">📷 กรอกชื่อแล้วกดปุ่มเพื่อเริ่มเก็บใบหน้า 3 มุม</div>
</div>

<div id="successOverlay" class="overlay">
    <div class="overlay-content">
        <p id="overlayMessage"></p>
        <button id="closeOverlayBtn">ตกลง</button>
    </div>
</div>

<script>
    // ⚠️ เปลี่ยนเป็น URL ของคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbwm_LnuYnfIh9_m4ax3lvFbJXnh-XXb67j85NGRlt1ZQP1nm13xXrItIwKicM4mmnd6/exec";

    let modelsLoaded = false;
    let currentStream = null;
    const video = document.getElementById('registerVideo');
    const canvas = document.getElementById('overlayCanvas');
    const ctx = canvas.getContext('2d');
    const regNameInput = document.getElementById('regName');
    const regStatusDiv = document.getElementById('regStatus');
    const captureBtn = document.getElementById('captureBtn');
    const overlay = document.getElementById('successOverlay');
    const overlayMessage = document.getElementById('overlayMessage');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    let capturedDescriptors = [];
    const REQUIRED_SAMPLES = 3;
    let isCapturing = false;

    function showOverlay(message) {
        overlayMessage.innerText = message;
        overlay.classList.add('active');
    }

    function hideOverlay() {
        overlay.classList.remove('active');
    }

    closeOverlayBtn.onclick = hideOverlay;
    overlay.onclick = (e) => { if (e.target === overlay) hideOverlay(); };

    async function startCamera() {
        if (currentStream) stopCamera();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } });
            video.srcObject = stream;
            currentStream = stream;
            await video.play();
            return true;
        } catch (err) {
            regStatusDiv.innerText = "❌ ไม่สามารถเปิดกล้องได้";
            return false;
        }
    }

    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
    }

    async function loadModels() {
        const MODEL_URL = './models';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            modelsLoaded = true;
            regStatusDiv.innerText = "✅ กล้องพร้อม กรอกชื่อแล้วกดปุ่มเพื่อเริ่มเก็บภาพ";
            startFaceDetectionLoop();
        } catch (err) {
            console.error(err);
            regStatusDiv.innerText = "❌ โหลดโมเดลไม่สำเร็จ ตรวจสอบโฟลเดอร์ /models";
        }
    }

    async function startFaceDetectionLoop() {
        if (!modelsLoaded) return;
        setInterval(async () => {
            if (video.readyState === 4) {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks();
                const displaySize = { width: video.videoWidth, height: video.videoHeight };
                faceapi.matchDimensions(canvas, displaySize);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (detections.length > 0) {
                    const resized = faceapi.resizeResults(detections, displaySize);
                    faceapi.draw.drawDetections(canvas, resized);
                    faceapi.draw.drawFaceLandmarks(canvas, resized);
                }
            }
        }, 100);
    }

    async function captureSingleDescriptor() {
        if (!modelsLoaded) throw new Error("Model not ready");
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();
        if (!detection) return null;
        return detection.descriptor;
    }

    function updateButtonCounter() {
        captureBtn.innerText = `💾 เก็บภาพ (${capturedDescriptors.length}/${REQUIRED_SAMPLES})`;
    }

    async function handleCapture() {
        const name = regNameInput.value.trim();
        if (!name) {
            showOverlay("⚠️ กรุณากรอกชื่อก่อน");
            return;
        }
        if (!modelsLoaded) {
            showOverlay("⏳ กำลังโหลดโมเดล กรุณารอสักครู่");
            return;
        }

        if (!isCapturing) {
            capturedDescriptors = [];
            isCapturing = true;
            captureBtn.disabled = false;
            regStatusDiv.innerText = `📸 กำลังเก็บภาพที่ 1/${REQUIRED_SAMPLES} กรุณาหันหน้าตรงกล้อง`;
            updateButtonCounter();
        }

        if (capturedDescriptors.length >= REQUIRED_SAMPLES) {
            await submitRegistration(name);
            return;
        }

        regStatusDiv.innerText = `🔍 กำลังตรวจจับใบหน้า...`;
        try {
            const descriptor = await captureSingleDescriptor();
            if (!descriptor) {
                regStatusDiv.innerText = `😕 ไม่พบใบหน้า กรุณาอยู่ในกรอบ (${capturedDescriptors.length}/${REQUIRED_SAMPLES})`;
                return;
            }

            capturedDescriptors.push(Array.from(descriptor));
            const count = capturedDescriptors.length;
            updateButtonCounter();

            if (count < REQUIRED_SAMPLES) {
                regStatusDiv.innerText = `✅ เก็บภาพที่ ${count} สำเร็จ! กรุณาขยับศีรษะเล็กน้อยแล้วกดปุ่มอีกครั้ง (${count}/${REQUIRED_SAMPLES})`;
            } else {
                regStatusDiv.innerText = `🎉 เก็บภาพครบ ${REQUIRED_SAMPLES} ภาพแล้ว กำลังส่งข้อมูล...`;
                await submitRegistration(name);
            }
        } catch (err) {
            console.error(err);
            regStatusDiv.innerText = `⚠️ เกิดข้อผิดพลาด: ${err.message}`;
        }
    }

    async function submitRegistration(name) {
        captureBtn.disabled = true;
        regStatusDiv.innerText = "📡 กำลังส่งข้อมูลไปยังเซิร์ฟเวอร์...";

        const formData = new URLSearchParams();
        formData.append('action', 'register');
        formData.append('name', name);
        formData.append('descriptors', JSON.stringify(capturedDescriptors));

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                showOverlay(`✅ ${result.message}`);
                regStatusDiv.innerText = "✔️ ลงทะเบียนสำเร็จ!";
                regNameInput.value = "";
            } else {
                showOverlay(`❌ ${result.message}`);
                regStatusDiv.innerText = `❌ ล้มเหลว: ${result.message}`;
            }
        } catch (err) {
            console.error(err);
            showOverlay(`❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์`);
            regStatusDiv.innerText = "❌ การเชื่อมต่อล้มเหลว";
        } finally {
            capturedDescriptors = [];
            isCapturing = false;
            captureBtn.disabled = false;
            updateButtonCounter();
        }
    }

    function goHome() {
        stopCamera();
        location.href = 'index.html';
    }

    window.onload = async () => {
        await loadModels();
        await startCamera();
        captureBtn.onclick = handleCapture;
        document.getElementById('backHomeBtn').onclick = goHome;
        updateButtonCounter();
    };

    window.onbeforeunload = () => stopCamera();
</script>
</body>
</html>
