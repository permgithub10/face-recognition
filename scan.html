<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ลงชื่อพ่นฆ่าเชื้อ</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            overflow: hidden;
            padding: 8px 20px 20px 20px;  /* ลด padding-top จากเดิม 20px เหลือ 8px */
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 6px;  /* ลดระยะห่างจาก status */
            color: #1e293b;
        }
        .status-message {
            background: #e6f7ff;
            padding: 10px 12px;
            border-radius: 28px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.9rem;
            color: #014361;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            width: 100%;
            height: 62vh;
            min-height: 320px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border-radius: 60px;
            border: none;
            background: #2c7da0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button.secondary {
            background: #475569;
            margin-top: 8px;
        }
        button:disabled {
            background: #94a3b8;
            transform: none;
            cursor: not-allowed;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease;
        }
        .overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .overlay-content {
            background: white;
            max-width: 280px;
            width: 80%;
            padding: 24px 20px 20px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .overlay-content p {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #1e293b;
        }
        .overlay-content button {
            background: #2c7da0;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            width: auto;
            min-width: 120px;
            cursor: pointer;
        }
        @media (max-width: 550px) {
            .container { padding: 6px 16px 16px 16px; }
            h2 { margin-bottom: 4px; }
            .video-wrapper { height: 55vh; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>✅ ลงชื่อพ่นฆ่าเชื้อ</h2>
    <!-- ย้าย status มาตรงนี้ ใต้หัวข้อ -->
    <div id="statusMsg" class="status-message">📷 กำลังเริ่มต้นกล้อง...</div>
    
    <div class="video-wrapper">
        <video id="scanVideo" autoplay muted playsinline></video>
    </div>
    <button id="startScanBtn">🚀 เริ่มสแกนใบหน้า</button>
    <button id="backHomeBtn" class="secondary">◀ กลับหน้าแรก</button>
</div>

<div id="resultOverlay" class="overlay">
    <div class="overlay-content">
        <p id="overlayMessage"></p>
        <button id="closeOverlayBtn">ตกลง</button>
    </div>
</div>

<script>
    // ⚠️ เปลี่ยน URL เป็นของคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbzWD79JU0VmJxbLUHlW2mOUvgdxWiLtQ5rkRxSNM2OkAxcx9yNoMvfo_NykLxarp7UY/exec";

    let modelsLoaded = false;
    let currentStream = null;
    let isScanning = false;

    const video = document.getElementById('scanVideo');
    const startScanBtn = document.getElementById('startScanBtn');
    const backHomeBtn = document.getElementById('backHomeBtn');
    const statusMsg = document.getElementById('statusMsg');
    const overlay = document.getElementById('resultOverlay');
    const overlayMessage = document.getElementById('overlayMessage');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    function showOverlay(message) {
        overlayMessage.innerText = message;
        overlay.classList.add('active');
    }

    function hideOverlay() {
        overlay.classList.remove('active');
        enableScanButton();
    }

    function enableScanButton() {
        startScanBtn.disabled = false;
        startScanBtn.innerText = "🚀 เริ่มสแกนใบหน้า";
        isScanning = false;
    }

    function disableScanButton() {
        startScanBtn.disabled = true;
        startScanBtn.innerText = "⏳ กำลังสแกน...";
        isScanning = true;
    }

    async function startCamera() {
        if (currentStream) stopCamera();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            });
            video.srcObject = stream;
            currentStream = stream;
            await video.play();
            return true;
        } catch (err) {
            console.error(err);
            showOverlay("❌ ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้อง");
            return false;
        }
    }

    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
    }

    async function loadModels() {
        const MODEL_URL = './models';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            modelsLoaded = true;
            statusMsg.innerText = "✅ กล้องพร้อม กดปุ่มเพื่อสแกน";
        } catch (err) {
            console.error(err);
            showOverlay("❌ โหลดโมเดลไม่สำเร็จ ตรวจสอบโฟลเดอร์ /models");
        }
    }

    async function getFaceDescriptor() {
        if (!modelsLoaded) throw new Error("Model not ready");
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();
        if (!detection) return null;
        return detection.descriptor;
    }

    async function performScan() {
        if (isScanning) return;
        if (!modelsLoaded) {
            showOverlay("⏳ กำลังโหลดโมเดล กรุณารอสักครู่");
            return;
        }

        disableScanButton();
        statusMsg.innerText = "🔍 กำลังตรวจจับใบหน้า...";

        const descriptor = await getFaceDescriptor();
        if (!descriptor) {
            showOverlay("❌ ไม่พบใบหน้า กรุณามองกล้องให้ชัดเจน");
            statusMsg.innerText = "❌ ไม่พบใบหน้า";
            enableScanButton();
            return;
        }

        statusMsg.innerText = "📡 กำลังส่งข้อมูลเพื่อยืนยันตัวตน...";
        const descriptorArray = Array.from(descriptor);
        const formData = new URLSearchParams();
        formData.append('action', 'login');
        formData.append('descriptor', JSON.stringify(descriptorArray));

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                const successMessage = result.name ? `คุณ ${result.name} ลงชื่อสำเร็จ` : `✅ ลงชื่อสำเร็จ!`;
                showOverlay(`✅ ${successMessage}`);
                statusMsg.innerText = `✅ ${successMessage}`;
            } else {
                showOverlay(`❌ ${result.message}`);
                statusMsg.innerText = `❌ ${result.message}`;
            }
        } catch (error) {
            console.error("Login error:", error);
            showOverlay("❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์");
            statusMsg.innerText = "❌ การเชื่อมต่อล้มเหลว";
        }
    }

    function goHome() {
        stopCamera();
        location.href = 'index.html';
    }

    window.onload = async () => {
        const modelPromise = loadModels();
        const cameraPromise = startCamera();
        await Promise.all([modelPromise, cameraPromise]);
        
        startScanBtn.onclick = performScan;
        backHomeBtn.onclick = goHome;
        closeOverlayBtn.onclick = hideOverlay;
        overlay.onclick = (e) => { if (e.target === overlay) hideOverlay(); };
        enableScanButton();
    };

    window.onbeforeunload = () => stopCamera();
</script>
</body>
</html>
