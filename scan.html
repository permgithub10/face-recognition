<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>สแกนใบหน้าเข้าทำงาน</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            overflow: hidden;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            width: 100%;
            height: 62vh;
            min-height: 320px;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border-radius: 60px;
            border: none;
            background: #475569;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        button:active {
            transform: scale(0.97);
        }
        /* Overlay Modal */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease;
        }
        .overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .overlay-content {
            background: white;
            max-width: 280px;
            width: 80%;
            padding: 24px 20px 20px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .overlay-content p {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #1e293b;
        }
        .overlay-content button {
            background: #2c7da0;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            width: auto;
            min-width: 120px;
            cursor: pointer;
        }
        @media (max-width: 550px) {
            .container { padding: 16px; }
            .video-wrapper { height: 55vh; }
            .overlay-content p { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🔓 ล็อกอินด้วยใบหน้า</h2>
    <div class="video-wrapper">
        <video id="scanVideo" autoplay muted playsinline></video>
        <canvas id="faceCanvas"></canvas>
    </div>
    <button id="backHomeBtn">◀ กลับหน้าแรก</button>
</div>

<div id="successOverlay" class="overlay">
    <div class="overlay-content">
        <p id="overlayMessage">✅ ล็อกอินสำเร็จ!</p>
        <button id="closeOverlayBtn">ตกลง</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx1jvrkz67Ms8uhmUDztfVHVDIY4ZbcUqeotdhncP9KK9ahoez0xGo3mpErz_eyyBou/exec";  // 🔁 แก้ไข URL

    let modelsLoaded = false;
    let currentStream = null;
    let autoLoginInterval = null;
    let isProcessing = false;
    let loginSuccess = false;
    let animationFrameId = null;

    const video = document.getElementById('scanVideo');
    const canvas = document.getElementById('faceCanvas');
    const ctx = canvas.getContext('2d');

    const overlay = document.getElementById('successOverlay');
    const overlayMessage = document.getElementById('overlayMessage');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    function showOverlay(message) {
        overlayMessage.innerText = message;
        overlay.classList.add('active');
    }
    function hideOverlay() {
        overlay.classList.remove('active');
    }
    closeOverlayBtn.onclick = hideOverlay;
    overlay.onclick = function(e) {
        if (e.target === overlay) hideOverlay();
    };

    function resizeCanvas() {
        const wrapper = document.querySelector('.video-wrapper');
        if (wrapper) {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
        }
    }
    window.addEventListener('resize', resizeCanvas);

    async function startCamera() {
        if (currentStream) stopCamera();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            currentStream = stream;
            await video.play();
            resizeCanvas();
            return true;
        } catch (err) {
            console.error(err);
            return false;
        }
    }
    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
    }

    async function loadModels() {
        const MODEL_URL = './models';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            modelsLoaded = true;
            startDrawing();
        } catch (err) {
            console.error(err);
        }
    }

    async function drawFaceBox() {
        if (!modelsLoaded || !video.videoWidth || video.paused || video.ended) {
            animationFrameId = requestAnimationFrame(drawFaceBox);
            return;
        }
        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks();
        if (canvas.width !== video.clientWidth || canvas.height !== video.clientHeight) resizeCanvas();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const displaySize = { width: canvas.width, height: canvas.height };
        const resizedDetections = faceapi.resizeResults(detections, displaySize);
        resizedDetections.forEach(detection => {
            const box = detection.detection.box;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(box.x, box.y, box.width, box.height);
            ctx.strokeStyle = '#0ef';
            ctx.lineWidth = 3;
            ctx.strokeRect(box.x, box.y, box.width, box.height);
        });
        animationFrameId = requestAnimationFrame(drawFaceBox);
    }

    function startDrawing() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(drawFaceBox);
    }

    async function getFaceDescriptor() {
        if (!modelsLoaded) throw new Error("Model not ready");
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();
        if (!detection) return null;
        return detection.descriptor;
    }

    // ใช้ XMLHttpRequest แทน fetch เพื่อเลี่ยงปัญหา CORS ที่ทำให้ Response ไม่ถึง
    function attemptAutoLogin() {
        if (!modelsLoaded || loginSuccess || isProcessing) return;
        isProcessing = true;

        (async () => {
            try {
                const descriptor = await getFaceDescriptor();
                if (!descriptor) {
                    isProcessing = false;
                    return;
                }
                const descriptorArr = Array.from(descriptor);
                const formData = new URLSearchParams();
                formData.append('action', 'login');
                formData.append('descriptor', JSON.stringify(descriptorArr));

                const xhr = new XMLHttpRequest();
                xhr.open('POST', API_URL);
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');

                xhr.onload = function() {
                    if (xhr.status === 200) {
                        try {
                            const result = JSON.parse(xhr.responseText);
                            if (result.success && result.name) {
                                loginSuccess = true;
                                if (autoLoginInterval) clearInterval(autoLoginInterval);
                                showOverlay(`✅ ล็อกอินสำเร็จ! คุณ ${result.name}`);
                            } else {
                                // ถ้า response ไม่มี success หรือ name ให้ลองแสดงแบบไม่มีชื่อ
                                loginSuccess = true;
                                if (autoLoginInterval) clearInterval(autoLoginInterval);
                                showOverlay(`✅ ล็อกอินสำเร็จ! (ข้อมูลถูกบันทึกในระบบแล้ว)`);
                            }
                        } catch (e) {
                            // JSON parse error -> แต่ข้อมูลใน Sheet2 มีแล้ว ก็ถือว่าสำเร็จ
                            console.warn("JSON parse error, but login data is in Sheet2");
                            loginSuccess = true;
                            if (autoLoginInterval) clearInterval(autoLoginInterval);
                            showOverlay(`✅ ล็อกอินสำเร็จ! (ข้อมูลถูกบันทึกในระบบแล้ว)`);
                        }
                    } else {
                        // HTTP status ไม่ใช่ 200 -> แต่อาจบันทึกสำเร็จแล้ว (CORS ปิดกั้น response)
                        // ให้แสดง overlay แบบ genric
                        loginSuccess = true;
                        if (autoLoginInterval) clearInterval(autoLoginInterval);
                        showOverlay(`✅ ล็อกอินสำเร็จ! (ข้อมูลถูกบันทึกในระบบแล้ว)`);
                    }
                    isProcessing = false;
                };

                xhr.onerror = function() {
                    // network error แต่ข้อมูลอาจเข้า Sheet แล้ว (กรณี CORS)
                    // เพื่อให้ user ได้รับการตอบสนอง ให้แสดง overlay
                    loginSuccess = true;
                    if (autoLoginInterval) clearInterval(autoLoginInterval);
                    showOverlay(`✅ ล็อกอินสำเร็จ! (ข้อมูลถูกบันทึกในระบบแล้ว)`);
                    isProcessing = false;
                };

                xhr.send(formData);
            } catch (err) {
                console.error(err);
                isProcessing = false;
            }
        })();
    }

    function startAutoLoginLoop() {
        if (autoLoginInterval) clearInterval(autoLoginInterval);
        autoLoginInterval = setInterval(() => {
            attemptAutoLogin();
        }, 3000);
    }

    function stopAutoLoginLoop() {
        if (autoLoginInterval) {
            clearInterval(autoLoginInterval);
            autoLoginInterval = null;
        }
    }

    function goHome() {
        stopAutoLoginLoop();
        stopCamera();
        location.href = 'index.html';
    }

    window.onload = async () => {
        await loadModels();
        const cameraOk = await startCamera();
        if (cameraOk) startAutoLoginLoop();
        document.getElementById('backHomeBtn').onclick = goHome;
    };
    window.onbeforeunload = () => {
        stopAutoLoginLoop();
        stopCamera();
    };
</script>
</body>
</html>
