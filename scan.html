<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>สแกนใบหน้าเข้าทำงาน</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            overflow: hidden;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: #1e293b;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            width: 100%;
            height: 62vh;
            min-height: 320px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border-radius: 60px;
            border: none;
            background: #2c7da0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button.secondary {
            background: #475569;
            margin-top: 8px;
        }
        button:disabled {
            background: #94a3b8;
            transform: none;
            cursor: not-allowed;
        }
        /* ---------- Overlay Modal ---------- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s ease;
        }
        .overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .overlay-content {
            background: white;
            max-width: 280px;
            width: 80%;
            padding: 24px 20px 20px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .overlay-content p {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #1e293b;
        }
        .overlay-content button {
            background: #2c7da0;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            width: auto;
            min-width: 120px;
            cursor: pointer;
        }
        @media (max-width: 550px) {
            .container { padding: 16px; }
            .video-wrapper { height: 55vh; }
            .overlay-content p { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🔓 ล็อกอินด้วยใบหน้า</h2>
    <div class="video-wrapper">
        <video id="scanVideo" autoplay muted playsinline></video>
        <!-- ไม่มี canvas สำหรับวาดกรอบแล้ว -->
    </div>
    <button id="startScanBtn">🚀 เริ่มสแกนใบหน้า</button>
    <button id="backHomeBtn" class="secondary">◀ กลับหน้าแรก</button>
</div>

<!-- Overlay Modal แสดงผลลัพธ์ -->
<div id="resultOverlay" class="overlay">
    <div class="overlay-content">
        <p id="overlayMessage"></p>
        <button id="closeOverlayBtn">ตกลง</button>
    </div>
</div>

<script>
    // ---------- ตั้งค่า API URL (เปลี่ยนเป็น Apps Script URL ของคุณ) ----------
    const API_URL = "https://script.google.com/macros/s/AKfycbx1jvrkz67Ms8uhmUDztfVHVDIY4ZbcUqeotdhncP9KK9ahoez0xGo3mpErz_eyyBou/exec";

    let modelsLoaded = false;
    let currentStream = null;
    let isScanning = false;        // กำลังสแกนหรือไม่
    let scanCompleted = false;     // สแกนเสร็จแล้ว (รอปุ่มกดใหม่)

    const video = document.getElementById('scanVideo');
    const startScanBtn = document.getElementById('startScanBtn');
    const backHomeBtn = document.getElementById('backHomeBtn');

    // Overlay elements
    const overlay = document.getElementById('resultOverlay');
    const overlayMessage = document.getElementById('overlayMessage');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    function showOverlay(message) {
        overlayMessage.innerText = message;
        overlay.classList.add('active');
    }
    function hideOverlay() {
        overlay.classList.remove('active');
        // เมื่อปิด overlay แล้ว ให้เปิดปุ่มสแกนใหม่ (ถ้าสแกนเสร็จแล้ว)
        if (scanCompleted) {
            enableScanButton();
        }
    }

    function enableScanButton() {
        startScanBtn.disabled = false;
        startScanBtn.innerText = "🚀 เริ่มสแกนใบหน้า";
        isScanning = false;
        scanCompleted = false;
    }

    function disableScanButton() {
        startScanBtn.disabled = true;
        startScanBtn.innerText = "⏳ กำลังสแกน...";
        isScanning = true;
    }

    // กล้อง
    async function startCamera() {
        if (currentStream) stopCamera();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            currentStream = stream;
            await video.play();
            return true;
        } catch (err) {
            console.error("Camera error:", err);
            showOverlay("❌ ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้อง");
            return false;
        }
    }
    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
    }

    // โหลดโมเดล face-api
    async function loadModels() {
        const MODEL_URL = './models';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            modelsLoaded = true;
            console.log("Models loaded");
        } catch (err) {
            console.error(err);
            showOverlay("❌ โหลดโมเดลไม่สำเร็จ ตรวจสอบโฟลเดอร์ /models");
        }
    }

    // ดึง descriptor จาก video ขณะนั้น (ครั้งเดียว)
    async function getFaceDescriptor() {
        if (!modelsLoaded) throw new Error("Model ยังไม่โหลด");
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceDescriptor();
        if (!detection) return null;
        return detection.descriptor;
    }

    // ฟังก์ชันหลักสำหรับสแกนใบหน้า (เรียกเมื่อกดปุ่ม)
    async function performScan() {
        if (isScanning) return;
        if (!modelsLoaded) {
            showOverlay("⏳ กำลังโหลดโมเดล กรุณารอสักครู่แล้วลองใหม่");
            return;
        }

        disableScanButton();

        try {
            // ตรวจจับใบหน้า
            const descriptor = await getFaceDescriptor();
            if (!descriptor) {
                // ไม่พบใบหน้า
                showOverlay("❌ ไม่พบใบหน้า กรุณามองกล้องให้ชัดเจน");
                scanCompleted = true;
                return;
            }

            const descriptorArray = Array.from(descriptor);
            const formData = new URLSearchParams();
            formData.append('action', 'login');
            formData.append('descriptor', JSON.stringify(descriptorArray));

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const result = await response.json();
            if (result.success) {
                // ล็อกอินสำเร็จ
                showOverlay(`✅ ${result.name} ล็อกอินสำเร็จ!`);
            } else {
                // ไม่ตรงกับฐานข้อมูล
                showOverlay(`❌ กรุณาลองใหม่ (ไม่พบใบหน้าตรงกับระบบ)`);
            }
        } catch (err) {
            console.error("Scan error:", err);
            showOverlay(`🌐 เกิดข้อผิดพลาด: ${err.message}`);
        } finally {
            scanCompleted = true;
            // ปุ่มจะถูก enable อีกครั้งเมื่อปิด overlay (ใน hideOverlay)
        }
    }

    // กลับหน้าแรก
    function goHome() {
        stopCamera();
        location.href = 'index.html';
    }

    // เริ่มต้น: โหลดโมเดล, เปิดกล้อง, และเตรียมปุ่ม
    window.onload = async () => {
        await loadModels();
        await startCamera();
        startScanBtn.onclick = performScan;
        backHomeBtn.onclick = goHome;
        closeOverlayBtn.onclick = hideOverlay;
        overlay.onclick = function(e) {
            if (e.target === overlay) hideOverlay();
        };
        enableScanButton();  // ปุ่มพร้อมใช้งาน
    };

    window.onbeforeunload = () => {
        stopCamera();
    };
</script>
</body>
</html>
